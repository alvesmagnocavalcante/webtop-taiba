x-vpn: &vpn
  build: .
  restart: unless-stopped
  privileged: true
  cap_add:
    - NET_ADMIN
  devices:
    - /dev/ppp

x-webtop: &webtop
  image: lscr.io/linuxserver/webtop:ubuntu-xfce
  restart: unless-stopped
  environment:
    PUID: "1000"
    PGID: "1000"
    TZ: America/Fortaleza
  shm_size: "1gb"

services:
  vpn-taiba:
    <<: *vpn
    container_name: vpn-taiba
    ports:
      - "3003:3000"
    volumes:
      - ./config-taiba.txt:/etc/openfortivpn/config:ro

  webtop-taiba:
    <<: *webtop
    container_name: webtop-taiba
    network_mode: "service:vpn-taiba"
    depends_on:
      - vpn-taiba
    volumes:
      - ./webtop-taiba:/config

  zabbix:
    image: zabbix/zabbix-appliance:alpine-latest
    container_name: zabbix
    restart: unless-stopped
    network_mode: "service:vpn-taiba"
    depends_on:
      - vpn-taiba
    volumes:
      - zabbix-data:/var/lib/mysql

  semaphore-db:
    image: postgres:16-alpine
    container_name: semaphore-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: semaphore
      POSTGRES_PASSWORD: semaphore
      POSTGRES_DB: semaphore
    volumes:
      - semaphore-db-data:/var/lib/postgresql/data

  semaphore:
    image: semaphoreui/semaphore:latest
    container_name: semaphore
    restart: unless-stopped
    network_mode: "service:vpn-taiba"
    depends_on:
      - vpn-taiba
      - semaphore-db
    environment:
      SEMAPHORE_DB_DIALECT: postgres
      SEMAPHORE_DB_HOST: semaphore-db
      SEMAPHORE_DB_PORT: "5432"
      SEMAPHORE_DB_USER: semaphore
      SEMAPHORE_DB_PASS: semaphore
      SEMAPHORE_DB: semaphore
      SEMAPHORE_PORT: "3005"
      SEMAPHORE_PLAYBOOK_PATH: /tmp/semaphore
      SEMAPHORE_ADMIN: admin
      SEMAPHORE_ADMIN_PASSWORD: admin
      SEMAPHORE_ADMIN_NAME: Admin
      SEMAPHORE_ADMIN_EMAIL: admin@localhost
      SEMAPHORE_ACCESS_KEY_ENCRYPTION: "0123456789abcdef0123456789abcdef"
      TZ: America/Fortaleza
    volumes:
      - semaphore-data:/var/lib/semaphore
      - semaphore-playbooks:/tmp/semaphore

  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    restart: unless-stopped
    network_mode: "service:vpn-taiba"
    depends_on:
      - vpn-taiba
    environment:
      TZ: America/Fortaleza
      GENERIC_TIMEZONE: America/Fortaleza
      N8N_HOST: localhost
      N8N_PORT: "5678"
      N8N_PROTOCOL: http
      WEBHOOK_URL: http://localhost:5678/
    volumes:
      - n8n-data:/home/node/.n8n

volumes:
  zabbix-data:
  semaphore-db-data:
  semaphore-data:
  semaphore-playbooks:
  n8n-data:
